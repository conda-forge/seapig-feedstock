context:
  version: "0.2.0"
  python_min: "3.11"

package:
  name: seapig
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/seapig/seapig-${{ version }}.tar.gz
  sha256: 99719a0bdf340c244d67017fddaa9c3832bd9a0c03e1f17930fc463d9b239927

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - pandas
    - pytorch
    - torchmetrics
    - tqdm
    - nmslib
    - lightning <=3.6.1
    - typing_extensions
    - matplotlib-base
    - pyod
    - umap-learn
    - scikit-learn
    - rich

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - seapig
      pip_check: true

about:
  homepage: https://www.seapig.dev
  repository: https://www.github.com/goergen95/seapig
  documentation: https://www.seapig.dev/reference
  license: MIT
  license_file: LICENSE
  summary: Selective prediction based on confidence scores
  description: |
    seapig provides confidence-based selective inference for deep learning models. Its main focus currently lies on analyzing latent representations. The library implements a small set of lightweight, composable confidence scores that are used to decide whether to accept or reject an individual query sample at prediction time.


extra:
  recipe-maintainers:
    - goergen95
